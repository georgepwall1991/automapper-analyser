name: Release to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  package:
    name: Build, test, and pack
    runs-on: ubuntu-latest
    outputs:
      package-sha256: ${{ steps.package.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          version=${GITHUB_REF#refs/tags/v}
          tag=${GITHUB_REF#refs/tags/}
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore automapper-analyser.sln

      - name: Build solution
        run: dotnet build automapper-analyser.sln --configuration Release --no-restore -warnaserror

      - name: Run all tests
        run: >-
          dotnet test tests/AutoMapperAnalyzer.Tests/AutoMapperAnalyzer.Tests.csproj
          --configuration Release --no-build --framework net10.0 --verbosity normal

      - name: Verify generated trust artifacts
        run: >-
          dotnet run --project tools/AnalyzerVerifier/AnalyzerVerifier.csproj
          --configuration Release --no-build --
          --check-catalog --check-snapshots --check-compatibility

      - name: Pack analyzer from tag version
        run: >-
          dotnet pack src/AutoMapperAnalyzer.Analyzers/AutoMapperAnalyzer.Analyzers.csproj
          --configuration Release --no-build --output ./nupkg
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Verify package contents and checksum
        id: package
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./nupkg/*.nupkg)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one .nupkg; found ${#packages[@]}." >&2
            exit 1
          fi
          package=${packages[0]}
          contents=$(unzip -Z1 "$package")
          case "$contents" in *"analyzers/dotnet/cs/AutoMapperAnalyzer.Analyzers.dll"*) ;; *) exit 1 ;; esac
          case "$contents" in *"README.md"*) ;; *) exit 1 ;; esac
          case "$contents" in *"icon.png"*) ;; *) exit 1 ;; esac
          echo "sha256=$(sha256sum "$package" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Upload immutable package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg
          retention-days: 90

  compatibility:
    name: Package Compatibility
    needs: package
    uses: ./.github/workflows/package-compatibility.yml
    with:
      artifact-name: nuget-package
      package-sha256: ${{ needs.package.outputs.package-sha256 }}

  publish:
    name: Publish verified package
    needs: [package, compatibility]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download verified package artifact
        uses: actions/download-artifact@v8
        with:
          name: nuget-package
          path: ./nupkg

      - name: Reverify package SHA-256
        id: package
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./nupkg/*.nupkg)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one .nupkg; found ${#packages[@]}." >&2
            exit 1
          fi
          package=${packages[0]}
          actual=$(sha256sum "$package" | cut -d ' ' -f 1)
          expected='${{ needs.package.outputs.package-sha256 }}'
          if [[ "$actual" != "$expected" ]]; then
            echo "Package SHA-256 mismatch. Expected $expected; got $actual." >&2
            exit 1
          fi
          echo "path=$package" >> "$GITHUB_OUTPUT"

      - name: Publish exact verified package to NuGet
        run: >-
          dotnet nuget push "${{ steps.package.outputs.path }}"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Generate release notes
        shell: bash
        run: |
          version='${{ needs.package.outputs.version }}'
          if [[ -f CHANGELOG.md ]]; then
            notes=$(sed -n "/## \[$version\]/,/## \[/p" CHANGELOG.md | sed '$d')
          fi
          if [[ -z "${notes:-}" ]]; then
            notes="See CHANGELOG.md for details."
          fi
          {
            printf '%s\n\n' "$notes"
            printf '## Installation\n\n'
            printf '```bash\n'
            printf 'dotnet add package AutoMapperAnalyzer.Analyzers --version %s\n' "$version"
            printf '```\n\n'
            printf '## NuGet Package\n\n'
            printf '📦 [AutoMapperAnalyzer.Analyzers on NuGet](https://www.nuget.org/packages/AutoMapperAnalyzer.Analyzers/%s)\n' "$version"
          } > release_notes.txt

      - name: Create GitHub release from verified package
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          name: Release ${{ needs.package.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(needs.package.outputs.version, '-') }}
          files: ${{ steps.package.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
