name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: 'automapper-analyser.sln'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build analyzer (with CodeFixes)
        run: |
          echo "Building unified analyzer package (includes CodeFixes)..."
          dotnet build src/AutoMapperAnalyzer.Analyzers/AutoMapperAnalyzer.Analyzers.csproj --no-restore --configuration Release -warnaserror

      - name: Build test project
        run: |
          echo "Building test project..."
          dotnet build tests/AutoMapperAnalyzer.Tests/AutoMapperAnalyzer.Tests.csproj --no-restore --configuration Release -warnaserror

      - name: Run unit tests with code coverage
        run: |
          echo "Running unit tests with code coverage collection..."
          dotnet test tests/AutoMapperAnalyzer.Tests/AutoMapperAnalyzer.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --settings coverlet.runsettings

      - name: Verify generated trust artifacts
        run: >-
          dotnet run --project tools/AnalyzerVerifier/AnalyzerVerifier.csproj
          --configuration Release --
          --check-catalog --check-snapshots --check-compatibility

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build samples (with analyzer warnings)
        run: |
          echo "Building samples project (expects analyzer warnings for demonstration)..."
          dotnet build samples/AutoMapperAnalyzer.Samples/AutoMapperAnalyzer.Samples.csproj --configuration Release --verbosity minimal
          echo "✅ Samples built successfully (analyzer warnings are expected and desired)"

  package:
    name: Package Analyzer
    needs: build
    runs-on: ubuntu-latest
    outputs:
      package-sha256: ${{ steps.package.outputs.sha256 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build unified analyzer package
        run: |
          # Build unified analyzer (includes CodeFixes)
          dotnet build src/AutoMapperAnalyzer.Analyzers/AutoMapperAnalyzer.Analyzers.csproj --no-restore --configuration Release -warnaserror

      - name: Pack unified analyzer
        run: dotnet pack src/AutoMapperAnalyzer.Analyzers/AutoMapperAnalyzer.Analyzers.csproj --no-build --configuration Release --output ./packages

      - name: Verify package contents
        id: package
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./packages/*.nupkg)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one .nupkg; found ${#packages[@]}." >&2
            exit 1
          fi
          package=${packages[0]}
          contents=$(unzip -Z1 "$package")
          case "$contents" in *"analyzers/dotnet/cs/AutoMapperAnalyzer.Analyzers.dll"*) ;; *) exit 1 ;; esac
          case "$contents" in *"README.md"*) ;; *) exit 1 ;; esac
          case "$contents" in *"icon.png"*) ;; *) exit 1 ;; esac
          echo "sha256=$(sha256sum "$package" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./packages/*.nupkg

